  <script>
    const md = "------\n\n# \u7ec6\u80de\u57f9\u517b\u4e0e\u514d\u75ab\u8367\u5149\u67d3\u8272\u5b8c\u6574 Protocol\n\n## \u4e00\u3001\u8bd5\u5242\u4e0e\u6750\u6599\n\n### 1. \u7ec6\u80de\u57f9\u517b\u76f8\u5173\n\n- MEM \u57f9\u517b\u57fa + 10% FBS\n- \u53cc\u6297\uff08100\u00d7\uff09\n- PBS\uff08\u9884\u70ed\uff09\n- Trypsin-EDTA\n- \u51bb\u5b58\u6db2\uff1a\n  - 55% \u57f9\u517b\u57fa\n  - 40% FBS\n  - 5% DMSO\n\n------\n\n### 2. \u514d\u75ab\u8367\u5149\u67d3\u8272\u76f8\u5173\n\n- \u56fa\u5b9a\u6db2\uff1a\n  - 4% \u591a\u805a\u7532\u919b\uff08PFA\uff09\n  - 0.1% \u620a\u4e8c\u919b\uff08\u53ef\u9009\uff09\n- \u900f\u5316\u6db2\uff1a\n  - 0.5% Triton X-100\uff08PBS\uff09\n- \u5c01\u95ed\u6db2\uff1a\n  - 5% BSA + 0.1% Triton X-100\uff08PBS\uff09\n- \u4e00\u6297\uff08\u5982 \u03b1-tubulin\uff09\n- \u8367\u5149\u4e8c\u6297\n- \uff08\u53ef\u9009\uff09\u5fae\u7ba1\u62bd\u63d0\u6db2\uff1a\n  - 0.1 M PIPES\n  - 1 mM EGTA\n  - 1 mM MgCl\u2082\n  - 0.2% Triton X-100\n\n------\n\n## \u4e8c\u3001\u7ec6\u80de\u57f9\u517b\n\n### 1. \u7ec6\u80de\u590d\u82cf\n\n1. \u51bb\u5b58\u7ba1\u7f6e\u4e8e **37\u00b0C \u6c34\u6d74**\u4e2d\u8f7b\u8f7b\u6447\u52a8\uff0c\u7ea6 **1\u20132 min**\n2. \u53d6\u51fa\u540e\u9152\u7cbe\u6d88\u6bd2\n3. \u5c06\u7ec6\u80de\u8f6c\u5165\u542b **5 mL \u5b8c\u5168\u57f9\u517b\u57fa**\u7684\u79bb\u5fc3\u7ba1\n4. **1000 rpm \u79bb\u5fc3 5\u20137 min**\n5. \u5f03\u4e0a\u6e05\uff0c\u91cd\u60ac\u7ec6\u80de\n6. \u63a5\u79cd\u81f3\u57f9\u517b\u76bf\n7. \u57f9\u517b\u6761\u4ef6\uff1a\n   - **37\u00b0C\uff0c5% CO\u2082**\n\n------\n\n### 2. \u7ec6\u80de\u4f20\u4ee3\n\n1. \u53bb\u9664\u57f9\u517b\u57fa\n2. PBS \u6d17\u6da4\u7ec6\u80de\uff1a\n   - **2 mL \u00d72**\n3. \u52a0\u5165 **Trypsin-EDTA\uff082\u20133 mL\uff09**\n4. \u6d88\u5316 **5\u201315 min**\uff08\u663e\u5fae\u955c\u4e0b\u89c2\u5bdf\u8131\u843d\uff09\n5. \u52a0\u57f9\u517b\u57fa\u7ec8\u6b62\u6d88\u5316\n6. \u5439\u6253\u6df7\u5300\uff086\u20137 \u6b21\uff09\n7. **1000 rpm \u79bb\u5fc3 5 min**\n8. \u91cd\u60ac\u7ec6\u80de\n9. \u6309 **1:3\u20131:6 \u6bd4\u4f8b**\u63a5\u79cd\u65b0\u57f9\u517b\u76bf\n\n------\n\n### 3. \u7ec6\u80de\u51bb\u5b58\n\n1. \u6536\u96c6\u7ec6\u80de\u5e76\u8ba1\u6570\uff1a\n   - \u63a8\u8350\u5bc6\u5ea6\uff1a**3\u00d710\u2076 cells/mL**\n2. \u52a0\u5165\u51bb\u5b58\u6db2\u6df7\u5300\n3. \u5206\u88c5\u81f3\u51bb\u5b58\u7ba1\uff08\u7ea6 **1 mL/\u7ba1**\uff09\n4. \u653e\u5165 **-80\u00b0C \u8fc7\u591c**\n5. \u8f6c\u5165\u6db2\u6c2e\u957f\u671f\u4fdd\u5b58\n\n------\n\n### 4. \u7ec6\u80de\u8ba1\u6570\uff08\u53ef\u9009\uff09\n\n- Trypan Blue \u67d3\u8272\uff1a\n  - \u6309 **1:1 \u6df7\u5408**\n- \u7528\u4e8e\u6d3b/\u6b7b\u7ec6\u80de\u8ba1\u6570\n\n------\n\n## \u4e09\u3001\u514d\u75ab\u8367\u5149\u67d3\u8272\uff08IF\uff09\n\n### 1. \u7ec6\u80de\u51c6\u5907\n\n1. \u5c06\u7ec6\u80de\u63a5\u79cd\u4e8e **35 mm \u73bb\u5e95\u57f9\u517b\u76bf**\n2. \u57f9\u517b\u81f3\u7ea6 **80% \u878d\u5408\u5ea6**\n3. \u7528\u9884\u70ed PBS \u6d17\u6da4\u7ec6\u80de\n\n------\n\n### 2.\uff08\u53ef\u9009\uff09\u5fae\u7ba1\u7ed3\u6784\u62bd\u63d0\n\n> \u4ec5\u5728\u89c2\u5bdf\u5fae\u7ba1\u7ed3\u6784\u65f6\u4f7f\u7528\n\n1. \u52a0\u5165\u62bd\u63d0\u6db2\n2. \u5904\u7406 **30 s**\n3. \u5438\u53bb\u62bd\u63d0\u6db2\n\n------\n\n### 3. \u56fa\u5b9a\uff08Fixation\uff09\n\n1. \u52a0\u5165\u56fa\u5b9a\u6db2\uff1a\n   - **4% PFA\uff08+0.1% \u620a\u4e8c\u919b\u53ef\u9009\uff09**\n2. \u5ba4\u6e29\u56fa\u5b9a **15 min**\n3. PBS \u6d17\u6da4\uff1a\n   - **3 \u6b21 \u00d7 1 min**\n\n------\n\n### 4. \u900f\u5316\uff08Permeabilization\uff09\n\n1. \u52a0\u5165 **0.5% Triton X-100**\n2. \u5904\u7406 **5 min**\n\n------\n\n### 5. \u5c01\u95ed\uff08Blocking\uff09\n\n1. \u52a0\u5165\u5c01\u95ed\u6db2\uff1a\n   - **5% BSA + 0.1% Triton X-100**\n2. \u5ba4\u6e29\u5b75\u80b2 **30 min**\n\n------\n\n### 6. \u4e00\u6297\u5b75\u80b2\n\n1. \u52a0\u5165\u4e00\u6297\uff08\u5982 \u03b1-tubulin\uff09\n2. \u5b75\u80b2\u6761\u4ef6\uff1a\n   - **37\u00b0C 1 h**\n     \u6216\n   - **4\u00b0C \u8fc7\u591c**\n3. \u7a00\u91ca\u6bd4\u4f8b\uff1a\n   - **1:100 \u2013 1:2000**\n\n------\n\n### 7. \u6d17\u6da4\n\n- PBS \u6d17\u6da4\uff1a\n  - **3 \u6b21 \u00d7 5 min**\n\n------\n\n### 8. \u4e8c\u6297\u5b75\u80b2\n\n1. \u52a0\u5165\u8367\u5149\u6807\u8bb0\u4e8c\u6297\n2. **37\u00b0C \u5b75\u80b2 1 h**\n3. \u7a00\u91ca\u6bd4\u4f8b\uff1a\n   - \u4e00\u822c **1:200**\n\n------\n\n### 9. \u6d17\u6da4\n\n- PBS\uff1a\n  - **3 \u6b21 \u00d7 5 min**\n\n------\n\n### 10. \u6210\u50cf\u51c6\u5907\n\n1. \u4fdd\u7559\u7ea6 **1 mL PBS**\n2. 4\u00b0C \u77ed\u671f\u4fdd\u5b58\u6216\u76f4\u63a5\u6210\u50cf\n\n------\n\n## \u56db\u3001\u5173\u952e\u6ce8\u610f\u4e8b\u9879\n\n- FBS\uff1a\n  - **-20\u00b0C \u2192 4\u00b0C \u89e3\u51bb**\n  - \u907f\u514d\u53cd\u590d\u51bb\u878d\uff08\u22641\u5468\uff09\n- \u900f\u5316\u65f6\u95f4\u8fc7\u957f\u4f1a\u7834\u574f\u7ed3\u6784\n- \u620a\u4e8c\u919b\u53ef\u63d0\u9ad8\u7ed3\u6784\u7a33\u5b9a\u6027\uff0c\u4f46\u53ef\u80fd\u589e\u52a0\u80cc\u666f\n- \u6297\u4f53\u9700\u4f18\u5316\u7a00\u91ca\u6bd4\u4f8b\n- \u94fa\u677f\u540e\u5efa\u8bae **\u8fc7\u591c\u518d\u8fdb\u884c\u67d3\u8272**\n- \u975e\u5fae\u7ba1\u7ed3\u6784\u5b9e\u9a8c\u53ef\u8df3\u8fc7\u62bd\u63d0\u6b65\u9aa4\n\n------\n\n## \u4e94\u3001\u6d41\u7a0b\u603b\u89c8\n\n```text\n\u7ec6\u80de\u590d\u82cf \u2192 \u57f9\u517b \u2192 \u4f20\u4ee3 \u2192 \u63a5\u79cd \u2192 80%\u878d\u5408\n\u2192\uff08\u53ef\u9009\u62bd\u63d0\uff09\u2192 \u56fa\u5b9a \u2192 \u900f\u5316 \u2192 \u5c01\u95ed\n\u2192 \u4e00\u6297 \u2192 \u6d17\u6da4 \u2192 \u4e8c\u6297 \u2192 \u6d17\u6da4 \u2192 \u6210\u50cf\n```\n\n------\n\n";

    <script>
    const docEl = document.getElementById('doc');
    const tocList = document.getElementById('toc-list');
    const toc = document.getElementById('toc');
    const tocToggle = document.getElementById('toc-toggle');
    const progressBar = document.getElementById('progress-bar');
    const readingMeta = document.getElementById('reading-meta');
    const slugify = (text) => text.toLowerCase().trim().replace(/[^\w\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '');
    const headings = Array.from(docEl.querySelectorAll('h2, h3'));
    const tocLinks = [];

    headings.forEach((h, i) => {
      if (!h.id) h.id = `${slugify(h.textContent || 'section') || 'section'}-${i+1}`;
      const a = document.createElement('a');
      a.href = `#${h.id}`;
      a.className = `toc-link ${h.tagName === 'H3' ? 'sub' : ''}`;
      a.textContent = h.textContent;
      tocList?.appendChild(a);
      tocLinks.push(a);
    });

    const words = (docEl.innerText || '').trim().split(/\s+/).filter(Boolean).length;
    const approxMinutes = Math.max(1, Math.round(words / 220));
    readingMeta.textContent = `${headings.length} 个章节节点 · 约 ${approxMinutes} 分钟读完`;

    const markActive = () => {
      let current = headings[0];
      headings.forEach((h) => {
        const top = h.getBoundingClientRect().top;
        if (top <= 140) current = h;
      });
      tocLinks.forEach((a) => a.classList.toggle('active', a.getAttribute('href') === `#${current?.id}`));
    };

    const updateProgress = () => {
      const scrollTop = window.scrollY;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const pct = maxScroll > 0 ? Math.min(100, Math.max(0, (scrollTop / maxScroll) * 100)) : 0;
      progressBar?.style.setProperty('--progress', `${pct}%`);
    };

    Array.from(docEl.querySelectorAll('blockquote')).forEach((el) => {
      const text = (el.textContent || '').trim();
      let type = 'note';
      let label = 'Note';
      if (/注意|警告|避免|必须|务必/i.test(text)) { type = 'warning'; label = 'Warning'; }
      else if (/建议|可选|推荐|提示|Tip/i.test(text)) { type = 'tip'; label = 'Tip'; }
      el.classList.add('callout', type);
      if (!el.querySelector('.callout-title')) {
        const title = document.createElement('div');
        title.className = 'callout-title';
        title.textContent = label;
        el.prepend(title);
      }
    });

    Array.from(docEl.querySelectorAll('h2, h3')).forEach((h) => {
      const text = (h.textContent || '').trim();
      if (/^step\s*\d+/i.test(text)) {
        const wrap = document.createElement('section');
        wrap.className = 'step-block';
        const label = document.createElement('div');
        label.className = 'step-label';
        const m = text.match(/^step\s*\d+/i);
        label.textContent = m ? m[0] : 'Step';
        h.parentNode.insertBefore(wrap, h);
        wrap.appendChild(label);
        wrap.appendChild(h);
        let next = wrap.nextSibling;
        while (next && !(next.nodeType === 1 && /H[23]/.test(next.tagName))) {
          const current = next;
          next = next.nextSibling;
          wrap.appendChild(current);
        }
      }
    });

    tocLinks.forEach((a) => a.addEventListener('click', () => {
      if (window.innerWidth <= 1080) toc?.classList.remove('open');
    }));
    tocToggle?.addEventListener('click', () => toc?.classList.toggle('open'));
    if (window.innerWidth > 1080) toc?.classList.add('open');

    document.getElementById('print-page')?.addEventListener('click', () => window.print());
    document.getElementById('copy-link')?.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(window.location.href); } catch (_) {}
    });
    document.getElementById('copy-title')?.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(document.title.replace(' | Mixz Notes', '')); } catch (_) {}
    });
    document.getElementById('scroll-first-step')?.addEventListener('click', () => {
      (headings[0] || docEl).scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    markActive();
    updateProgress();
    window.addEventListener('scroll', () => { markActive(); updateProgress(); }, { passive: true });
  </script>

<button class="back-to-top" id="back-to-top" type="button" aria-label="回到顶部" title="回到顶部">↑</button>

<script>
  (() => {
    const btn = document.getElementById('back-to-top');
    if (!btn) return;
    const toggle = () => btn.classList.toggle('visible', window.scrollY > 280);
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    window.addEventListener('scroll', toggle, { passive: true });
    toggle();
  })();
</script>

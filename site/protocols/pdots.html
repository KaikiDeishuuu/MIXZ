  <script>
    const md = "------\n\n# Pdots \u5236\u5907\u3001\u5076\u8054\u4e0e\u8868\u5f81\u5b9e\u9a8c Protocol\n\n> \u9002\u7528\u4e8e PFPV/PSMA \u4f53\u7cfb Pdots \u7684\u5236\u5907\u3001Pdots-SA \u5076\u8054\uff0c\u4ee5\u53ca\u5438\u6536\u5149\u8c31\u3001\u53d1\u5c04\u5149\u8c31\u548c\u7c92\u5f84\u8868\u5f81\u3002\n> \u672c protocol \u6309\u5b9e\u9a8c\u8bb0\u5f55\u6574\u7406\uff0c\u7edf\u4e00\u4e3a\u53ef\u6253\u5370\u7248\u672c\u3002\n> **\u6d53\u5ea6\u8bf4\u660e\uff1a\u9664\u7279\u522b\u6ce8\u660e\u5916\uff0c\u6587\u4e2d ppm \u5747\u6309 PFPV \u6d53\u5ea6\u8ba1\u7b97\uff0c\u4e0d\u5c06 PSMA \u8ba1\u5165 ppm\u3002**\n\n------\n\n## \u4e00\u3001\u5b9e\u9a8c\u76ee\u7684\n\n1. \u5236\u5907\u4ee5 **PFPV** \u4e3a\u53d1\u5149\u4e3b\u4f53\u3001**PSMA** \u4e3a\u529f\u80fd\u5316/\u9632\u805a\u96c6\u7ec4\u5206\u7684 Pdots\u3002\n2. \u901a\u8fc7 **EDC** \u5c06 **Streptavidin\uff08SA\uff09** \u5076\u8054\u81f3 Pdots \u8868\u9762\uff0c\u5f97\u5230 **Pdots-SA**\u3002\n3. \u5bf9 Pdots \u6216 Pdots-SA \u8fdb\u884c\u4ee5\u4e0b\u8868\u5f81\uff1a\n   - \u5438\u6536\u5149\u8c31\uff08UV-Vis\uff09\n   - \u53d1\u5c04\u5149\u8c31\uff08Fluorescence\uff09\n   - \u7c92\u5f84\uff08DLS\uff09\n\n------\n\n## \u4e8c\u3001\u8bd5\u5242\u4e0e\u6750\u6599\n\n### 2.1 \u8bd5\u5242\n\n- **PFPV**\uff1a\u53d1\u5149\u5171\u8f6d\u805a\u5408\u7269\n\n- **PSMA**\uff1a\u529f\u80fd\u5316\u805a\u5408\u7269\uff08\u9632\u805a\u96c6\uff09\n\n- **THF**\uff1a\u805a\u5408\u7269\u6eb6\u5242\n\n- \u53bb\u79bb\u5b50\u6c34\n\n- **HEPES \u7f13\u51b2\u6db2**\uff1a1 M\n\n- **PEG \u6c34\u6eb6\u6db2**\uff1a5%\n\n- **EDC \u6c34\u6eb6\u6db2**\uff1a5 mg/mL\n\n  > -20\u00b0C \u51b7\u51bb\u4fdd\u5b58\uff08\u7b2c\u4e00\u5c42\uff09\n\n- **Streptavidin\uff08SA\uff09**\uff1a1 mg/mL\n\n- **Triton**\uff08\u5b9e\u9a8c\u8bb0\u5f55\u4e2d\u7528\u4e8e\u9632\u805a\u96c6\uff1b\u5177\u4f53\u578b\u53f7/\u5168\u79f0\u540e\u7eed\u6309\u8bd5\u5242\u74f6\u8865\u5168\uff09\n\n### 2.2 \u8017\u6750\n\n- 1.5 mL EP \u7ba1\n- 100 kDa \u8d85\u6ee4\u7ba1\n- 200 nm \u6ee4\u5634/\u6ee4\u819c\n- 10 mL \u6ce8\u5c04\u5668\n- \u67f1\u72b6\u6837\u54c1\u6c60 / \u6bd4\u8272\u76bf\n- \u5c01\u53e3\u819c\n- \u9521\u7eb8\n- \u78e8\u7802\u7eb8\n- \u67aa\u5934\u3001\u6ef4\u7ba1\u7b49\u5e38\u89c4\u8017\u6750\n\n### 2.3 \u4eea\u5668\n\n- \u8d85\u58f0\u4eea\n- \u52a0\u70ed\u53f0\n- \u901a\u98ce\u6a71 / \u5439\u6c14\u88c5\u7f6e\n- UV-Vis \u4eea\uff08UVProbe\uff09\n- \u8367\u5149\u5206\u5149\u5149\u5ea6\u8ba1\uff08FL-Solutions\uff09\n- Zetasizer \u7c92\u5f84\u4eea\n- \u79bb\u5fc3\u673a\uff08\u53ef\u914d 2# \u8f6c\u5b50\uff09\n\n------\n\n## \u4e09\u3001\u5b89\u5168\u4e0e\u901a\u7528\u6ce8\u610f\u4e8b\u9879\n\n- \u5b9e\u9a8c\u65f6\u4f69\u6234\u624b\u5957\u548c\u53e3\u7f69\uff1b\u5982\u6761\u4ef6\u5141\u8bb8\uff0c\u7a7f\u5b9e\u9a8c\u670d\u3002\n- THF \u5177\u6709\u6325\u53d1\u6027\uff0c\u76f8\u5173\u64cd\u4f5c\u5c3d\u91cf\u5728\u901a\u98ce\u6761\u4ef6\u4e0b\u8fdb\u884c\u3002\n- \u6837\u54c1\u5c3d\u91cf\u907f\u5149\uff0c\u5fc5\u8981\u65f6\u7528\u9521\u7eb8\u5305\u88f9\u3002\n- \u52a0\u6837\u65f6\u907f\u514d\u6c14\u6ce1\u3002\n- \u4e0a\u673a\u524d\u64e6\u62ed\u6837\u54c1\u6c60/\u5bb9\u5668\u5916\u58c1\u53ca\u5e95\u90e8\uff0c\u907f\u514d\u6307\u7eb9\u3001\u6c34\u75d5\u548c\u6c61\u67d3\u3002\n- \u79bb\u5fc3\u64cd\u4f5c\u5fc5\u987b\u914d\u5e73\u3002\n- \u65b0\u5236\u5907\u7684 Pdots \u7c92\u5f84\u901a\u5e38\u8f83\u5c0f\uff0c\u653e\u7f6e\u540e\u53ef\u80fd\u53d1\u751f\u805a\u96c6\u589e\u5927\u3002\n- \u5b9e\u9a8c\u7ed3\u675f\u540e\u53ca\u65f6\u5173\u95ed\u8d85\u58f0\u4eea\u3001\u52a0\u70ed\u53f0\u3001\u5439\u6c14\u88c5\u7f6e\u3001\u79bb\u5fc3\u673a\u53ca\u76f8\u5173\u8f6f\u4ef6/\u4eea\u5668\u7535\u6e90\u3002\n\n------\n\n## \u56db\u3001\u6d53\u5ea6\u5b9a\u4e49\u4e0e\u8ba1\u7b97\u539f\u5219\n\n### 4.1 \u539f\u6db2\u6d53\u5ea6\u5b9a\u4e49\n\n\u6587\u4e2d **1000 ppm \u539f\u6db2**\u5b9a\u4e49\u4e3a\uff1a\n$$\n1000\\ \\text{ppm} = 1000\\ \\text{mg/L} = 1\\ \\text{mg/mL}\n$$\n\u5373\uff1a\n\n- **1 mg PFPV + 1 mL THF = 1000 ppm PFPV \u539f\u6db2**\n- **1 mg PSMA + 1 mL THF = 1000 ppm PSMA \u539f\u6db2**\n\n### 4.2 \u524d\u6db2\u6d53\u5ea6\u5b9a\u4e49\n\n\u5236\u5907\u805a\u5408\u7269\u524d\u6db2\u65f6\uff0c**100 ppm \u4ec5\u6309 PFPV \u6d53\u5ea6\u8ba1\u7b97**\uff0c**PSMA \u4e0d\u8ba1\u5165 ppm**\u3002\n\n\u4f8b\u5982\uff1a\n\n- 500 \u03bcL 1000 ppm PFPV \u539f\u6db2\u542b **0.5 mg PFPV**\n- \u603b\u4f53\u79ef\u5b9a\u5bb9\u81f3 5 mL\n\n\u5219\uff1a\n$$\n\\frac{0.5\\ \\text{mg}}{5\\ \\text{mL}} = 0.1\\ \\text{mg/mL} = 100\\ \\text{ppm}\n$$\n\n------\n\n# \u4e94\u3001Pdots \u5236\u5907\n\n## Step 1. \u5236\u5907\u805a\u5408\u7269\u539f\u6db2\uff081000 ppm\uff09\n\n\u5206\u522b\u914d\u5236 **PFPV \u539f\u6db2**\u548c **PSMA \u539f\u6db2**\u3002\n\n### 5.1 PFPV \u539f\u6db2\n\n1. \u51c6\u5907\u597d\u6837\u54c1\u74f6\u5e76\u505a\u597d\u6807\u7b7e\uff08\u59d3\u540d\u3001\u6837\u54c1\u540d\u3001\u65e5\u671f\u3001\u6d53\u5ea6\uff09\u3002\n2. \u79f0\u53d6 **1 mg PFPV**\u3002\n3. \u52a0\u5165 **1 mL THF**\u3002\n4. \u8d85\u58f0\u4f7f\u5176\u5145\u5206\u6df7\u5300\uff0c\u5f97\u5230 **1000 ppm PFPV \u539f\u6db2**\u3002\n\n### 5.2 PSMA \u539f\u6db2\n\n1. \u51c6\u5907\u597d\u6837\u54c1\u74f6\u5e76\u505a\u597d\u6807\u7b7e\u3002\n2. \u79f0\u53d6 **1 mg PSMA**\u3002\n3. \u52a0\u5165 **1 mL THF**\u3002\n4. \u8d85\u58f0\u4f7f\u5176\u5145\u5206\u6df7\u5300\uff0c\u5f97\u5230 **1000 ppm PSMA \u539f\u6db2**\u3002\n\n### 5.3 \u6ce8\u610f\u4e8b\u9879\n\n- \u542b THF \u7684\u539f\u6db2\u5efa\u8bae\u4f7f\u7528**\u74f6\u76d6\u5e26\u9521\u7eb8**\u7684\u74f6\u5b50\u4fdd\u5b58\u3002\n- \u5236\u6210\u7684 Pdots \u5efa\u8bae\u4f7f\u7528**\u74f6\u76d6\u4e0d\u5e26\u9521\u7eb8**\u7684\u74f6\u5b50\u4fdd\u5b58\u3002\n- \u8bb0\u5f55\u4e2d\u63d0\u5230\uff1a**\u4e00\u4e2a\u6837\u54c1\u901a\u5e38\u9700\u8981 3 \u4e2a\u74f6\u5b50 + 1 \u4e2a\u74f6\u76d6**\uff0c\u53ef\u6309\u5b9e\u9a8c\u5ba4\u5b9e\u9645\u4e60\u60ef\u51c6\u5907\u3002\n\n------\n\n## Step 2. \u5236\u5907 5 mL\u3001100 ppm \u805a\u5408\u7269\u524d\u6db2\n\n\u6309\u4e0b\u5217\u914d\u6bd4\u52a0\u5165\uff1a\n\n- **500 \u03bcL 1000 ppm PFPV \u539f\u6db2**\n- **100 \u03bcL 1000 ppm PSMA \u539f\u6db2**\n  \uff08PSMA \u52a0\u5165\u91cf\u4e3a PFPV \u4f53\u79ef\u7684 20%\uff09\n- **4.4 mL THF**\n\n\u6df7\u5408\u540e\u8d85\u58f0\uff0c\u4f7f\u6eb6\u6db2\u5145\u5206\u5747\u5300\u3002\n\n### 5.4 \u8bf4\u660e\n\n\u672c\u6b65\u9aa4\u4e2d\u524d\u6db2\u6d53\u5ea6\u6309 **PFPV** \u6d53\u5ea6\u8ba1\u7b97\uff0c\u4e0d\u5c06 PSMA \u8ba1\u5165 ppm\u3002\n\u56e0\u6b64\uff0c\u6240\u5f97\u524d\u6db2\u4e3a **5 mL 100 ppm \u805a\u5408\u7269\u524d\u6db2**\u3002\n\n------\n\n## Step 3. \u5236\u5907 Pdots\n\n1. \u9884\u5148\u51c6\u5907\u7ea6 **10 mL \u53bb\u79bb\u5b50\u6c34**\u3002\n2. \u5728**\u8d85\u58f0\u6761\u4ef6**\u4e0b\uff0c\u5c06\u805a\u5408\u7269\u524d\u6db2**\u8fb9\u8d85\u58f0\u8fb9\u7f13\u6162\u6253\u5165\u6c34\u4e2d**\u3002\n3. \u6ce8\u5165\u8fc7\u7a0b\u4e2d\u6ce8\u610f\uff1a\n   - \u5c3d\u91cf**\u7f13\u6162\u52a0\u5165**\uff0c\u5fc5\u8981\u65f6\u95f4\u9694\u4e00\u6bb5\u65f6\u95f4\u518d\u7ee7\u7eed\u52a0\u5165\uff1b\n   - \u8d85\u58f0\u65f6\u4fdd\u6301**\u74f6\u5185\u6db2\u9762\u4f4e\u4e8e\u74f6\u5916\u6db2\u9762**\u3002\n4. \u524d\u6db2\u5168\u90e8\u52a0\u5165\u540e\uff0c\u7ee7\u7eed\u8d85\u58f0 **2\u20133 min**\u3002\n5. \u5c06\u6837\u54c1\u8f6c\u79fb\u81f3\u52a0\u70ed\u53f0\uff0c\u5e76\u7528\u67aa\u5934\u5439\u6c14\u53bb\u9664 THF \u548c\u90e8\u5206\u6c34\uff1a\n   - \u5148\u5f00\u5c0f\u9600\u95e8\uff1b\n   - \u518d\u9010\u6b65\u5f00\u5927\u9600\u95e8\uff1b\n   - \u6301\u7eed\u89c2\u5bdf\u6db2\u9762\uff0c\u9632\u6b62\u6ea2\u51fa\u3002\n6. \u5439\u6c14/\u52a0\u70ed\u81f3\u6db2\u9762\u4e0b\u964d\u81f3\u5408\u9002\u4f4d\u7f6e\uff08\u4ee5\u5b9e\u9a8c\u5ba4\u65e2\u6709\u7ecf\u9a8c\u4e3a\u51c6\uff09\u3002\n7. \u653e\u51c9\u3002\n8. \u7528 **10 mL \u6ce8\u5c04\u5668 + 200 nm \u6ee4\u5634/\u6ee4\u819c**\u8fdb\u884c\u8fc7\u6ee4\u3002\n9. \u7528\u5c01\u53e3\u819c\u5bc6\u5c01\uff1b\u82e5\u6837\u54c1\u7a33\u5b9a\u6027\u8f83\u5dee\uff0c\u53ef\u989d\u5916\u5305\u4e00\u5c42\u9521\u7eb8\u3002\n10. \u653e\u5165\u51b0\u7bb1\u4fdd\u5b58\u3002\n\n### 5.5 \u6536\u5c3e\n\n- \u6536\u62fe\u53f0\u9762\n- \u5783\u573e\u6309\u89c4\u5b9a\u4e22\u5f03\n- \u5173\u95ed\u8d85\u58f0\u4eea\u3001\u52a0\u70ed\u53f0\u3001\u901a\u98ce\u6a71/\u5439\u6c14\u7cfb\u7edf\u7b49\u8bbe\u5907\n\n------\n\n# \u516d\u3001Pdots \u5438\u6536\u5149\u8c31\u6d4b\u5b9a\uff08UV-Vis\uff09\n\n## 6.1 \u76ee\u7684\n\n\u6d4b\u5b9a Pdots \u6837\u54c1\u5438\u6536\u5cf0\u4f4d\u7f6e\u53ca\u5438\u5149\u5ea6\uff0c\u5e76\u901a\u8fc7\u4e0e 4 ppm PFPV \u6807\u6837\u5bf9\u6bd4\u4f30\u7b97\u6837\u54c1\u6d53\u5ea6\u3002\n\n## 6.2 \u6807\u6837\u914d\u5236\n\n\u914d\u5236 **4 ppm PFPV \u6807\u6837**\uff1a\n\n- **20 \u03bcL PFPV + 5 mL \u6c34**\n\n\u4f5c\u4e3a\u5bf9\u6bd4\u6807\u51c6\u4f7f\u7528\u3002\n\n## 6.3 \u4eea\u5668\u4e0e\u8f6f\u4ef6\n\n- UV-Vis \u4eea\n- UVProbe \u8f6f\u4ef6\n\n## 6.4 \u6d4b\u91cf\u6b65\u9aa4\n\n### \uff081\uff09\u57fa\u7ebf\u6d4b\u5b9a\n\n1. \u6253\u5f00\u4eea\u5668\u5e76\u8fde\u63a5 UVProbe\u3002\n2. \u5de6\u53f3\u4e24\u4fa7\u67f1\u72b6\u5bb9\u5668\u5185\u5206\u522b\u52a0\u5165 **2 mL \u6c34**\u3002\n3. \u8fdb\u884c\u6eb6\u5242\u57fa\u7ebf\u6d4b\u91cf\u3002\n4. \u6ce2\u957f\u626b\u63cf\u8303\u56f4\u53ef\u8bbe\u4e3a\uff1a\n\n$$\n1100 \\sim 250\\ \\text{nm}\n$$\n\n\u5982\u5df2\u77e5\u5927\u81f4\u5cf0\u4f4d\uff0c\u53ef\u9002\u5f53\u7f29\u5c0f\u8303\u56f4\u3002\n\n### \uff082\uff09\u6837\u54c1\u6d4b\u5b9a\n\n1. \u5c06\u53f3\u4fa7\u5bb9\u5668\u4e2d\u7684\u6c34\u66f4\u6362\u4e3a **2 mL Pdots \u6837\u54c1**\u3002\n2. \u6ce8\u610f\u6e05\u6d17\u676f\u67f1\u3002\n3. \u52a0\u6837\u65f6\u907f\u514d\u4ea7\u751f\u6c14\u6ce1\u3002\n4. \u7528\u78e8\u7802\u7eb8\u64e6\u62ed\u5bb9\u5668\u4e0b\u90e8\u540e\u653e\u5165\u4eea\u5668\u3002\n5. \u70b9\u51fb\u5f00\u59cb\u6d4b\u91cf\u3002\n6. \u6d4b\u8bd5\u5b8c\u6210\u540e\u8fdb\u884c\u5cf0\u503c\u68c0\u6d4b\uff0c\u8bb0\u5f55\uff1a\n   - \u5cf0\u503c\u6ce2\u957f\n   - \u5bf9\u5e94 Abs\n7. \u70b9\u51fb\u6ce2\u957f\u4f4d\u7f6e\u53ef\u66f4\u7cbe\u786e\u8bfb\u53d6\u5bf9\u5e94 Abs \u503c\u3002\n\n### \uff083\uff09\u6570\u636e\u4fdd\u5b58\n\n1. \u65b0\u5efa\u6587\u4ef6\u5939\uff0c\u547d\u540d\u683c\u5f0f\u5efa\u8bae\u4e3a\uff1a\n\n```\nUV-Name-\u65e5\u671f-\u6837\u54c1\n```\n\n1. \u6570\u636e\u53e6\u5b58\u4e3a **.txt \u683c\u5f0f**\u3002\n\n## 6.5 \u6d53\u5ea6\u8ba1\u7b97\n\n\u6837\u54c1\u6d4b\u5b8c\u540e\uff0c\u5c06\u6837\u54c1\u5012\u56de\u3002\n\u6e05\u6d17\u676f\u67f1\u540e\uff0c\u66f4\u6362\u4e3a **2 mL 4 ppm \u6807\u6837**\u91cd\u590d\u6d4b\u91cf\u3002\n\n\u6837\u54c1\u6d53\u5ea6\u6309\u4e0b\u5f0f\u8ba1\u7b97\uff1a\n$$\nC_{\\text{sample}} = \\frac{Abs_{\\text{sample}}}{Abs_{4ppm}} \\times 4\\ \\text{ppm}\n$$\n\u5176\u4e2d\uff1a\n\n\\( Abs_{\\mathrm{sample}} \\)\uff1a\u6837\u54c1\u5438\u6536\u5cf0\u5904\u5438\u5149\u5ea6\n\n\\( Abs_{4\\,\\mathrm{ppm}} \\)\uff1a4 ppm \u6807\u6837\u5728\u5bf9\u5e94\u4f4d\u7f6e\u7684\u5438\u5149\u5ea6\n\n------\n\n# \u4e03\u3001Pdots \u53d1\u5c04\u5149\u8c31\u6d4b\u5b9a\uff08FL-Solutions\uff09\n\n## 7.1 \u76ee\u7684\n\n\u6d4b\u5b9a Pdots \u7684\u8367\u5149\u53d1\u5c04\u5149\u8c31\u3002\n\n## 7.2 \u5f00\u673a\u8981\u6c42\n\n1. \u6253\u5f00\u4eea\u5668\u7535\u6e90\u3002\n2. **\u7b49\u5f85\u4e24\u4e2a\u706f\u90fd\u4eae\u540e**\uff0c\u518d\u6253\u5f00 FL-Solutions \u8f6f\u4ef6\u3002\n3. \u82e5\u53ea\u6709\u4e00\u4e2a\u706f\u4eae\uff0c\u5219\u91cd\u65b0\u5f00\u5173\uff0c\u76f4\u81f3\u4e24\u4e2a\u706f\u5747\u6b63\u5e38\u70b9\u4eae\u3002\n\n## 7.3 \u6837\u54c1\u51c6\u5907\n\n- \u5411\u67f1\u72b6\u5bb9\u5668\u4e2d\u52a0\u5165 **2 mL \u6837\u54c1**\u3002\n\n## 7.4 \u8f6f\u4ef6\u8bbe\u7f6e\u6d41\u7a0b\n\n\u5728\u53f3\u4fa7\u680f\u4f9d\u6b21\u70b9\u51fb\uff1a\n\n- **Method**\n- **Sample**\n- **Measure**\n\n\u5176\u4e2d\uff1a\n\n- **Sample** \u4e2d\u586b\u5199\u547d\u540d\u4fe1\u606f\uff08\u5efa\u8bae\u201c\u59d3\u540d + \u6587\u4ef6\u540d\u201d\uff09\n\n## 7.5 Method \u53c2\u6570\u8bbe\u7f6e\n\n### \uff081\uff09General\n\n- \u9009\u62e9 **wavelength scan**\n\n### \uff082\uff09Instrument\n\n- **EX WL = \u54 \u7ba1\u907f\u5149\u3002\n2. \u5ba4\u6e29\u4e0b\u6df7\u5300\u53cd\u5e94\u3002\n3. \u6df7\u5300\u901f\u5ea6\u63a7\u5236\u5728 **\u2264 20 r/min**\u3002\n4. \u53cd\u5e94\u65f6\u95f4 **4 h**\uff0c\u4e5f\u53ef\u8d85\u8fc7 4 h\u3002\n5. \u8bb0\u5f55\u8d77\u6b62\u65f6\u95f4\u3002\n\n\u53cd\u5e94\u7ed3\u675f\u540e\u5f97\u5230 **Pdots-SA**\u3002\n\n------\n\n# \u4e5d\u3001Pdots-SA \u7eaf\u5316\uff08\u53bb\u9664\u591a\u4f59 SA\uff09\n\n## 9.1 \u539f\u7406\n\n\u91c7\u7528 **100 kDa \u8d85\u6ee4\u79bb\u5fc3** \u53bb\u9664\u4f53\u7cfb\u4e2d\u672a\u53cd\u5e94\u7684\u6e38\u79bb SA \u548c\u5176\u4ed6\u5c0f\u5206\u5b50\u6742\u8d28\u3002\n\n## 9.2 \u6d17\u8131\u6db2\u914d\u7f6e\n\n\u6309\u4ee5\u4e0b\u6bd4\u4f8b\u914d\u7f6e **50 mL \u6d17\u8131\u6db2**\uff1a\n\n- **1 mL 5% PEG**\n- **1 mL HEPES**\n- **48 mL \u6c34**\n\n\u6df7\u5300\u5907\u7528\u3002\n\n## 9.3 \u8d85\u6ee4\u7ba1\u9884\u5904\u7406\n\n1. \u9009\u7528 **100 kDa \u8d85\u6ee4\u7ba1**\u3002\n2. \u68c0\u67e5\u76d6\u5b50\uff0c\u907f\u514d\u76d6\u6b6a\u3002\n3. \u52a0\u5165 **4 mL \u6c34**\u9884\u6d17\u3002\n4. \u4f7f\u7528 **2# \u8f6c\u5b50**\u79bb\u5fc3\uff1a\n   - **3000\u20133500 rpm**\n   - **3 min 30 s**\n5. \u68c0\u67e5\u8d85\u6ee4\u7ba1\u662f\u5426\u6f0f\u6c34\u3002\n6. \u79bb\u5fc3\u64cd\u4f5c\u65f6\u52a1\u5fc5\u4f7f\u7528\u914d\u5e73\u7ba1\u3002\n\n## 9.4 \u8d85\u6ee4\u7eaf\u5316\u6b65\u9aa4\n\n1. \u5c06\u5076\u8054\u540e\u7684 **Pdots-SA** \u8f6c\u79fb\u81f3\u8d85\u6ee4\u7ba1\u4e2d\u3002\n2. \u52a0\u5165\uff1a\n   - **3 mL \u6d17\u8131\u6db2**\n   - **20 \u03bcL Triton**\uff08\u9632\u805a\u96c6\uff09\n3. \u4f7f\u7528 **2# \u8f6c\u5b50**\u79bb\u5fc3\u3002\n4. \u653e\u5165\u79bb\u5fc3\u673a\u65f6\uff0c\u6ce8\u610f**\u819c\u671d\u5411\u81ea\u5df1**\u3002\n5. \u79bb\u5fc3\u6761\u4ef6\uff1a\n   - **3000 rpm**\n   - **2 min 30 s**\n   - \u6700\u540e\u4e00\u6b21\u53ef\u8bbe\u4e3a **3 min**\n6. \u79bb\u5fc3\u5b8c\u6210\u540e\uff0c\u5012\u6389\u4e0b\u65b9\u6e05\u6db2\u3002\n7. \u518d\u6b21\u52a0\u5165\u7ea6 **3.x mL \u6d17\u     tocToggle?.addEventListener('click', () => toc?.classList.toggle('open'));
    if (window.innerWidth > 1080) toc?.classList.add('open');

    document.getElementById('print-page')?.addEventListener('click', () => window.print());
    document.getElementById('copy-link')?.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(window.location.href); } catch (_) {}
    });
    document.getElementById('copy-title')?.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(document.title.replace(' | Mixz Notes', '')); } catch (_) {}
    });
    document.getElementById('scroll-first-step')?.addEventListener('click', () => {
      (headings[0] || docEl).scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    markActive();
    updateProgress();
    window.addEventListener('scroll', () => { markActive(); updateProgress(); }, { passive: true });
  </script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\(','\)']], displayMath: [['$$','$$']] }, svg: { fontCache: 'global' } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<button class="back-to-top" id="back-to-top" type="button" aria-label="回到顶部" title="回到顶部">↑</button>

<script>
  (() => {
    const btn = document.getElementById('back-to-top');
    if (!btn) return;
    const toggle = () => btn.classList.toggle('visible', window.scrollY > 280);
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    window.addEventListener('scroll', toggle, { passive: true });
    toggle();
  })();
</script>

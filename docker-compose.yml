services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    environment:
      MIXZ_POSTGRES_DSN: ${MIXZ_POSTGRES_DSN:?MIXZ_POSTGRES_DSN must be set}
      MIXZ_ENV: ${MIXZ_ENV:-production}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./site:/var/www/html:ro
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${MIXZ_WEB_PORT:-8080}:80"
    restart: unless-stopped

<article
  data-archive-row="true"
  data-search="{{ p.search_blob|escape }}"
  data-journal-slug="{{ p.journal_slug }}"
  data-index="{{ idx }}"
  x-show="(search === '' || $el.dataset.search.includes(search.toLowerCase())) && (activeJournal === 'all' || $el.dataset.journalSlug === activeJournal) && Number($el.dataset.index) < visibleCount"
  class="py-4 md:py-5"
  x-transition>

  <div class="flex flex-col gap-3">
    <div class="flex flex-wrap items-start justify-between gap-3">
      <h3 class="m-0 text-[18px] leading-7 font-semibold text-slateui-900 max-w-[72ch]">
        <a href="{{ p.detail_href }}" class="hover:text-accentui-700 transition-colors">
          {{ p.title }}
        </a>
      </h3>
      <span class="meta-text whitespace-nowrap">{{ p.pub_date or '日期待补' }}</span>
    </div>

    <div class="flex flex-wrap items-center gap-2 text-[12px] text-[var(--text-sub)]">
      <span class="chip h-[26px]">{{ p.journal or '未知期刊' }}</span>
      <span>{{ p.author }}</span>
      <span aria-hidden="true">·</span>
      <span>摘要来源 {{ p.source }}</span>
    </div>

    <p class="m-0 muted-text line-clamp-3">{{ p.snippet }}</p>

    <div class="flex flex-wrap items-center gap-3">
      <a href="{{ p.detail_href }}" class="button-base button-secondary h-[32px] px-3">查看详情</a>
      <a href="{{ p.doi_url }}" target="_blank" rel="noopener noreferrer" class="text-[13px] text-[var(--accent)] hover:underline">DOI</a>
    </div>
  </div>
</article>

<article class="section-panel-subtle p-4 md:p-5 flex flex-col gap-3" x-transition>
  <div class="flex justify-between items-center gap-3">
    <span class="chip">{{ item.eyebrow }}</span>
    <span class="text-xl" aria-hidden="true">{{ item.icon }}</span>
  </div>

  <h3 class="m-0 text-[18px] leading-7 font-semibold text-slateui-900">{{ item.title }}</h3>

  <p class="muted-text m-0 flex-1">{{ item.description }}</p>

  <div class="flex flex-wrap gap-2">
    {% for tag in item.tags %}
    <span class="chip">{{ tag }}</span>
    {% endfor %}
  </div>

  <div class="flex justify-start items-center gap-3 pt-3 mt-auto border-t border-[var(--line)]">
    <a href="/protocols/{{ item.slug }}.html" class="button-base button-secondary h-[32px] px-3">
      查看操作流
    </a>
  </div>
</article>
